version: '3.8'

# Multi-Server Dashboard Setup
# Dieses Setup ermöglicht die Überwachung mehrerer Server

services:
  # Haupt-Dashboard Server
  dashboard-master:
    build: .
    container_name: dashboard-master
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MODE=master
      - API_KEY=${API_KEY:-changeme}
    volumes:
      - dashboard-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - dashboard-net

  # Agent auf Server 1 (lokaler Server)
  agent-local:
    build: .
    container_name: dashboard-agent-local
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DASHBOARD_SERVER=ws://dashboard-master:3000
      - API_KEY=${API_KEY:-changeme}
      - SERVER_ID=local-server
      - UPDATE_INTERVAL=5000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    networks:
      - dashboard-net
    depends_on:
      - dashboard-master

  # Optional: Datenbank für Langzeitspeicherung
  influxdb:
    image: influxdb:2.7
    container_name: dashboard-influxdb
    restart: unless-stopped
    environment:
      - INFLUXDB_DB=dashboard
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=${INFLUXDB_PASSWORD:-admin123}
      - INFLUXDB_HTTP_AUTH_ENABLED=true
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - dashboard-net
    ports:
      - "8086:8086"

  # Optional: Grafana für Visualisierung
  grafana:
    image: grafana/grafana:latest
    container_name: dashboard-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - dashboard-net
    ports:
      - "3001:3000"
    depends_on:
      - influxdb

networks:
  dashboard-net:
    driver: bridge

volumes:
  dashboard-data:
  influxdb-data:
  grafana-data:
